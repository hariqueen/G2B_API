name: Run Data Collection

on:
  schedule:
    # 매일 아침 8시(KST) = 매일 23시(UTC)
    - cron: '0 23 * * *'
  workflow_dispatch:  # 수동으로도 실행 가능

jobs:
  collect-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # keep-alive 커밋 푸시용 (60일 자동중단 방지)
    env:
      # 공공데이터포털 API 키 (필수)
      BID_API_KEY: ${{ secrets.BID_API_KEY }}
      # Firebase 서비스 계정 JSON (문자열). main.py가 환경변수 기반으로 파싱함.
      FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
      # Firestore (g2b-bid-finder) 서비스 계정 JSON. ax_collector.py가 파싱함.
      FIREBASE_CREDENTIALS2: ${{ secrets.FIREBASE_CREDENTIALS2 }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run data collection script
        run: python main.py
      
      # 수집 결과 파일 읽기 (다중 키워드 지원)
      - name: Read collection results
        id: read_results
        if: success()
        run: |
          if [ -f collection_result.json ]; then
            # jq 파싱 실패로 전체 워크플로우가 실패하지 않도록 기본값을 둔다.
            TOTAL_COUNT="$(jq -r '.total_count' collection_result.json 2>/dev/null || echo 0)"
            COLLECTION_DATE="$(jq -r '.collection_date' collection_result.json 2>/dev/null || date)"
            echo "TOTAL_COUNT=$TOTAL_COUNT" >> $GITHUB_OUTPUT
            echo "COLLECTION_DATE=$COLLECTION_DATE" >> $GITHUB_OUTPUT
            
            # 키워드별 수집 현황 생성
            KEYWORD_RESULTS=""
            if [ "$(jq -r '.keyword_results' collection_result.json)" != "null" ]; then
              KEYWORD_RESULTS="$(jq -r '.keyword_results | to_entries[] | "• \(.key): \(.value)건"' collection_result.json 2>/dev/null || true)"
            fi
            
            # 키워드별 공고 목록 생성
            BID_LIST=""
            if [ "$(jq -r '.total_count' collection_result.json)" -gt 0 ]; then
              # keyword_bid_details에서 키워드별로 공고 목록 추출
              if [ "$(jq -r '.keyword_bid_details // empty' collection_result.json 2>/dev/null)" != "" ]; then
                BID_LIST="$(jq -r '.keyword_bid_details | to_entries[] | select(.value | length > 0) | "\n[\(.key)] \(.value | length)건:\(.value[] | "\n  • \(.["공고명"]) (\(.["채권자명"]))")"' collection_result.json 2>/dev/null || true)"
              else
                BID_LIST="$(jq -r '.bid_details[] | "• \(.["공고명"]) (\(.["채권자명"]))"' collection_result.json 2>/dev/null || true)"
              fi
            else
              BID_LIST="수집된 공고가 없습니다."
            fi
            
            # 여러 줄 문자열을 GitHub Output에 저장
            {
              echo 'KEYWORD_RESULTS<<EOF'
              echo "$KEYWORD_RESULTS"
              echo 'EOF'
            } >> $GITHUB_OUTPUT
            
            {
              echo 'BID_LIST<<EOF'
              echo "$BID_LIST"
              echo 'EOF'
            } >> $GITHUB_OUTPUT
            
            # AX Firestore 수집 결과
            AX_UPSERTED="$(jq -r '.ax_result.upserted_records // 0' collection_result.json 2>/dev/null || echo 0)"
            AX_TOTAL="$(jq -r '.ax_result.total_collected // 0' collection_result.json 2>/dev/null || echo 0)"
            echo "AX_UPSERTED=$AX_UPSERTED" >> $GITHUB_OUTPUT
            echo "AX_TOTAL=$AX_TOTAL" >> $GITHUB_OUTPUT
            
            AX_BID_LIST=""
            if [ "$AX_UPSERTED" -gt 0 ] 2>/dev/null; then
              AX_BID_LIST="$(jq -r '.ax_bid_details[] | "• \(.["공고명"]) (\(.["채권자명"]))"' collection_result.json 2>/dev/null || true)"
            else
              AX_BID_LIST="새로 수집된 AX 공고가 없습니다."
            fi
            
            {
              echo 'AX_BID_LIST<<EOF'
              echo "$AX_BID_LIST"
              echo 'EOF'
            } >> $GITHUB_OUTPUT
          else
            echo "TOTAL_COUNT=0" >> $GITHUB_OUTPUT
            echo "COLLECTION_DATE=$(date)" >> $GITHUB_OUTPUT
            echo "KEYWORD_RESULTS=결과 파일을 찾을 수 없습니다." >> $GITHUB_OUTPUT
            echo "BID_LIST=결과 파일을 찾을 수 없습니다." >> $GITHUB_OUTPUT
            echo "AX_UPSERTED=0" >> $GITHUB_OUTPUT
            echo "AX_TOTAL=0" >> $GITHUB_OUTPUT
            echo "AX_BID_LIST=결과 파일을 찾을 수 없습니다." >> $GITHUB_OUTPUT
          fi

      # 알림 수신자 목록을 RTDB(/notification_emails)에서 읽어옴 (대시보드 '설정' 탭에서 관리)
      - name: Resolve notification recipients
        id: recipients
        if: always()
        run: |
          python - <<'PY'
          import os, json
          to = "hariqueen98@gmail.com"  # 기본값(목록이 비었거나 조회 실패 시)
          try:
              import firebase_admin
              from firebase_admin import credentials, db
              cred = credentials.Certificate(json.loads(os.environ["FIREBASE_CREDENTIALS"]))
              firebase_admin.initialize_app(cred, {"databaseURL": "https://g2b-db-6aae9-default-rtdb.asia-southeast1.firebasedatabase.app/"})
              data = db.reference("/notification_emails").get() or {}
              emails = sorted({
                  (v.get("email") or "").strip()
                  for v in data.values()
                  if isinstance(v, dict) and v.get("enabled", True) and (v.get("email") or "").strip()
              })
              if emails:
                  to = ",".join(emails)
          except Exception as e:
              print(f"::warning::수신자 목록 조회 실패, 기본값 사용: {e}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"LIST={to}\n")
          print(f"발송 대상: {to}")
          PY

      # 성공 시에도 이메일 알림 보내기 (다중 키워드 정보 포함)
      - name: Send Gmail notification on success
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "[G2B 수집완료] RTDB ${{ steps.read_results.outputs.TOTAL_COUNT }}건 + AX ${{ steps.read_results.outputs.AX_UPSERTED }}건"
          body: |
            G2B 입찰 데이터 수집이 완료되었습니다!
            
            ═══════════════════════════════════
            📋 콜센터 운영 위탁 (RTDB) 수집 결과
            ═══════════════════════════════════
            • 총 수집 공고: ${{ steps.read_results.outputs.TOTAL_COUNT }}건
            • 수집 완료 시간: ${{ steps.read_results.outputs.COLLECTION_DATE }}
            
            키워드별 수집 현황:
            ${{ steps.read_results.outputs.KEYWORD_RESULTS }}
            
            키워드별 수집된 공고 목록:
            ${{ steps.read_results.outputs.BID_LIST }}
            
            ═══════════════════════════════════
            🔍 AX/BPR/ISP (Firestore) 수집 결과
            ═══════════════════════════════════
            • AX 키워드 적재: ${{ steps.read_results.outputs.AX_UPSERTED }}건
            • AX API 수신: ${{ steps.read_results.outputs.AX_TOTAL }}건
            
            AX 수집된 공고 목록:
            ${{ steps.read_results.outputs.AX_BID_LIST }}
            
            ═══════════════════════════════════
            🔗 대시보드 확인
            ═══════════════════════════════════
            대시보드에서 확인하기: https://g2b.onrender.com
            
            ---
            G2B 입찰 데이터 자동 수집 시스템 (RTDB + Firestore 통합)
          to: ${{ steps.recipients.outputs.LIST }}
          from: G2B 수집시스템
          
      # 실패 시 이메일 알림 보내기
      - name: Send Gmail notification on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "[G2B 오류] 다중키워드 데이터 수집 실패"
          body: |
            ⚠️ G2B 다중키워드 데이터 수집 중 오류가 발생했습니다.
            
            • 실행 시간: ${{ github.event.repository.updated_at }}
            • 워크플로우: ${{ github.workflow }}
            
            🔗 대시보드 확인: https://g2b.onrender.com
            
            GitHub Actions 로그를 확인하여 문제를 해결해 주세요.
            
            ---
            G2B 입찰 데이터 자동 수집 시스템
          to: ${{ steps.recipients.outputs.LIST }}
          from: G2B 수집시스템

      # 60일 무활동 시 GitHub이 스케줄 워크플로우를 자동 비활성화하는 것을 방지
      # (마지막 커밋이 45일 이상 지났을 때만 빈 커밋을 만들어 활동 기록을 남김)
      - name: Keepalive (prevent scheduled workflow auto-disable)
        if: always()
        run: |
          LAST=$(git log -1 --format=%ct)
          DIFF=$(( ( $(date +%s) - LAST ) / 86400 ))
          echo "마지막 커밋 ${DIFF}일 전"
          if [ "$DIFF" -ge 45 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            mkdir -p .github
            date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/last_keepalive.txt
            git add .github/last_keepalive.txt
            git commit -m "chore: keepalive [skip ci]"
            git push
            echo "keepalive 커밋 푸시 완료"
          else
            echo "keepalive 불필요 (45일 미만)"
          fi